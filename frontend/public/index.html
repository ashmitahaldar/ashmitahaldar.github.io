<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#000000" />
        <meta
            name="description"
            content="Ashmita Haldar — CS student & builder. Code, pixels, and the occasional pun: projects, writing, and creative experiments."
        />
        <link rel="icon" href="/favicon.png" />
        <link rel="apple-touch-icon" href="/favicon.png" />

        <!-- Open Graph (site-level defaults; per-route values set client-side) -->
        <meta property="og:site_name" content="Ashmita Haldar" />
        <meta property="og:type" content="website" />
        <meta property="og:url" content="https://ashmitahaldar.com/" />
        <meta property="og:title" content="Ashmita Haldar — CS Student & Builder" />
        <meta
            property="og:description"
            content="Ashmita Haldar — CS student & builder. Code, pixels, and the occasional pun: projects, writing, and creative experiments."
        />
        <meta property="og:image" content="https://ashmitahaldar.com/og-cover.png" />

        <!-- Twitter Card -->
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:title" content="Ashmita Haldar — CS Student & Builder" />
        <meta
            name="twitter:description"
            content="Ashmita Haldar — CS student & builder. Code, pixels, and the occasional pun: projects, writing, and creative experiments."
        />
        <meta name="twitter:image" content="https://ashmitahaldar.com/og-cover.png" />

        <link rel="alternate" type="application/rss+xml" title="ashmita.haldar — blog" href="/feed.xml" />
        <link rel="alternate" type="application/rss+xml" title="ashmita.haldar — lab log" href="/log.xml" />
        <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
        <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
        <title>Ashmita Haldar | Portfolio</title>
        <script>
            // Set theme before first paint to avoid a flash of the wrong mode.
            (function () {
                try {
                    var t = localStorage.getItem('ashmayo-theme');
                    document.documentElement.setAttribute('data-theme', t === 'light' ? 'light' : 'dark');
                } catch (e) {
                    document.documentElement.setAttribute('data-theme', 'dark');
                }
            })();
        </script>
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>

</html>
